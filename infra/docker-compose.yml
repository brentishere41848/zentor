services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zentor
      POSTGRES_PASSWORD: zentor
      POSTGRES_DB: zentor
    ports:
      - "15432:5432"
    volumes:
      - zentor_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zentor -d zentor"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    environment:
      DATABASE_URL: postgres://zentor:zentor@postgres:5432/zentor
      REDIS_URL: redis://redis:6379
      ZENTOR_API_BIND_ADDR: 0.0.0.0:8000
      ZENTOR_DEV_PROJECT_ID: zentor-default
      ZENTOR_DEV_PUBLIC_CLIENT_KEY: zentor-public-client
      RUST_LOG: zentor_api=info,tower_http=info
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  zentor_postgres:
