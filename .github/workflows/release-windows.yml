name: Windows Release Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix"
        required: true
        default: "0.1.0"
      allow_development_model:
        description: "Allow installer build when AI model metadata has production_ready=false"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-windows-installers:
    name: Build MSI and EXE
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }
          $buildNumber = ($version -replace "[^0-9]", "")
          if ([string]::IsNullOrWhiteSpace($buildNumber)) {
            $buildNumber = "1"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "build_number=$buildNumber" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore Flutter dependencies
        working-directory: apps/pasus_client
        run: flutter pub get

      - name: Restore WiX tool
        run: dotnet tool restore

      - name: Build Flutter Windows app
        working-directory: apps/pasus_client
        run: flutter build windows --release --build-name "${{ steps.version.outputs.version }}" --build-number "${{ steps.version.outputs.build_number }}" --dart-define=PASUS_APP_VERSION="${{ steps.version.outputs.version }}"

      - name: Build local scan core
        working-directory: core/pasus_local_core
        run: cargo build --release

      - name: Build guard service
        working-directory: core/pasus_guard_service
        run: cargo build --release

      - name: Package Windows installers
        shell: pwsh
        run: |
          $scriptArgs = @{
            Version = "${{ steps.version.outputs.version }}"
            RequireLocalCore = $true
            SkipFlutterBuild = $true
          }
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ("${{ inputs.allow_development_model }}" -eq "true") {
              $scriptArgs.AllowDevelopmentModel = $true
            }
          } else {
            $metadata = Get-Content -Raw -LiteralPath "assets\models\pasus_static_malware_model.metadata.json" | ConvertFrom-Json
            if (-not $metadata.production_ready) {
              $scriptArgs.AllowDevelopmentModel = $true
            }
          }
          try {
            & .\installer\windows\build-msi.ps1 @scriptArgs
          } catch {
            $message = $_.Exception.Message
            $message = $message.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Host "::error title=Pasus installer packaging failed::$message"
            throw
          }

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pasus-windows-installers-${{ steps.version.outputs.version }}
          path: |
            dist/Pasus-${{ steps.version.outputs.version }}-x64.msi
            dist/Pasus-${{ steps.version.outputs.version }}-x64-setup.exe
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Pasus ${{ steps.version.outputs.version }}
          prerelease: true
          fail_on_unmatched_files: true
          body: |
            Windows installer release for Pasus.

            Assets:
            - Pasus-${{ steps.version.outputs.version }}-x64.msi
            - Pasus-${{ steps.version.outputs.version }}-x64-setup.exe

            The current bundled AI model may be marked as a development model in its metadata. Pasus must not claim production AI protection unless `production_ready=true`.
          files: |
            dist/Pasus-${{ steps.version.outputs.version }}-x64.msi
            dist/Pasus-${{ steps.version.outputs.version }}-x64-setup.exe
